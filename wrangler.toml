# Cloudflare Pages + Functions + D1 配置
# 本地开发：D1 用本地 SQLite（miniflare），database_id 可保持占位
# 上线前：执行 `wrangler d1 create tension-fence-cost-db`，把返回的 database_id 填到下方，
#         或在 Cloudflare Pages 控制台 Settings → Functions → D1 bindings 里绑定（binding 名必须是 DB）

name = "tension-fence-cost"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "tension-fence-cost-db"
database_id = "26db9847-32b7-49fa-a3d7-a6be99d80932"

# 合同附件存储 R2。本项目绑定通过 wrangler.toml 管理（D1 同此）。
# bucket_name 必须是真实存在的桶名，否则 Pages 构建会失败。
[[r2_buckets]]
binding = "R2"
bucket_name = "contract-bucket-prod"
